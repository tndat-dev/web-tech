<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mini Project #3 - My Wiki</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="topbar">
    <button class="logo" data-top="home">IT4409</button>
    <nav id="top-menu" class="top-menu"></nav>
  </header>

  <div class="shell">
    <aside class="side">
      <h2 id="side-title">My Wiki</h2>
      <nav id="left-menu"></nav>
    </aside>
    <main>
      <section class="admin-card">
        <h1>My Wiki Admin</h1>
        <p>Select a content item and choose how it should be displayed: HTML, Wikipedia Search, Wikipedia Page Summary, or Wikipedia Random Article.</p>
        <div id="editor"></div>
      </section>
      <section id="content-grid" class="content-grid"></section>
    </main>
  </div>

  <footer class="footer">Mini Project #3 - AJAX with Wikipedia API</footer>
  <script src="app.js"></script>
</body>
</html>
